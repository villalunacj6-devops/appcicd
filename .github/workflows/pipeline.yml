name: React Native Smart CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-app-syntax-and-tests:
    name: Syntax Sweep and Test Suite Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          # Fetch all history so we can diff against the last successful run
          fetch-depth: 0
          # Authenticating checkout with your Personal Access Token (PAT)
          token: ${{ secrets.PAT }}

      # Dynamically finds the last successful commit of this workflow on main
      - name: Locate Last Successful Commit
        id: last_success
        uses: nrwl/last-successful-commit-action@v1
        with:
          branch: 'main'
          workflow_id: 'pipeline.yml' # Ensure this matches your actual workflow filename in .github/workflows/
          github_token: ${{ secrets.PAT }}

      - name: Initialize Node Lifecycle Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Pure Dependencies
        run: npm ci

      - name: Run Complete Syntax Validation and Unit Testing
        id: run_tests
        run: npm run test

      # --- SELECTIVE REVERT ON TEST FAILURE (Bypasses workflow files) ---
      - name: Revert Failed Files to Last Green State
        if: failure() && github.event_name == 'push' && steps.run_tests.outcome == 'failure'
        env:
          MY_PAT: ${{ secrets.PAT }}
          LAST_GREEN_SHA: ${{ steps.last_success.outputs.sha }}
        run: |
          echo "TESTS FAILED: Reverting application changes to the last known green commit..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force checkout the main branch explicitly
          git checkout main

          # Determine the base commit to revert back to
          TARGET_SHA="$LAST_GREEN_SHA"
          if [ -z "$TARGET_SHA" ]; then
            echo "Warning: No previous successful run found. Falling back to HEAD~1 as safe baseline."
            TARGET_SHA=$(git rev-parse HEAD~1)
          fi
          echo "Restoring application files back to state at: $TARGET_SHA"

          # 1. Find all files that changed between the target SHA and current broken HEAD
          CHANGED_FILES=$(git diff --name-only $TARGET_SHA HEAD)

          # 2. Filter out workflow files to protect the pipeline itself and bypass Github restrictions
          REVERT_FILES=""
          for file in $CHANGED_FILES; do
            if [[ "$file" != .github/* ]]; then
              REVERT_FILES="$REVERT_FILES $file"
            else
              echo "Skipping system file to preserve pipeline stability: $file"
            fi
          done

          if [ -z "$REVERT_FILES" ]; then
            echo "No application source files changed. Nothing to revert."
            exit 0
          fi

          # 3. Restore only the application files back to their target green state
          echo "Reverting: $REVERT_FILES"
          git checkout $TARGET_SHA -- $REVERT_FILES

          # 4. Commit and push back to main with [skip ci] to prevent infinite run loops
          git commit -m "chore: auto-revert broken changes to last passing state ($TARGET_SHA) [skip ci]"
          git push https://x-access-token:${MY_PAT}@github.com/${{ github.repository }}.git main

  deploy-infrastructure:
    name: Automated App Release Router
    needs: verify-app-syntax-and-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Environment Node Hook
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Reinstall Application Node Trees
        run: npm ci

      - name: Connect Environment Cloud Session
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Detect Changed Paths
        uses: dorny/paths-filter@v3
        id: files_filter
        with:
          filters: |
            native_configs:
              - 'app.json'
              - 'eas.json'
            source_code:
              - '**/*.ts'
              - '**/*.tsx'
            dependencies:
              - 'package.json'
              - 'package-lock.json'

      # Sweeps EAS for matching production app binaries to verify baseline compatibility
      - name: Check for Existing Production Native Builds
        id: build_check
        run: |
          BUILD_COUNT=$(eas build:list --platform android --profile production --json --non-interactive | jq 'length')
          echo "Found $BUILD_COUNT existing android production builds."
          if [ "$BUILD_COUNT" -eq 0 ]; then
            echo "force_apk_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "force_apk_build=false" >> "$GITHUB_OUTPUT"
          fi

      # PATH A: Generates standalone production APK/AAB binary if native configurations change OR no builds exist yet
      - name: Deploy Fresh Native Base Android Production Binary
        id: deploy_native
        if: |
          steps.files_filter.outputs.native_configs == 'true' || 
          steps.build_check.outputs.force_apk_build == 'true'
        run: eas build --profile production --platform android --non-interactive

      # PATH B: Delivers lightweight Over-The-Air bundle directly matching the exact native runtime signature of the latest build
      - name: Ship Fast Over-The-Air (OTA) Production Channel Update
        id: ship_ota
        if: |
          steps.build_check.outputs.force_apk_build == 'false' && 
          steps.files_filter.outputs.native_configs == 'false' && 
          (steps.files_filter.outputs.source_code == 'true' || steps.files_filter.outputs.dependencies == 'true')
        run: |
          # Dynamically extracts the fingerprint/version runtime token from app.json
          RUNTIME_VERSION=$(npx expo config --json | jq -r '.exp.runtimeVersion.policy // .exp.runtimeVersion')
          echo "Targeting Runtime Version Matcher: $RUNTIME_VERSION"
          
          # Publishes to production channel restricted strictly to the current build fingerprint structure
          eas update --channel production --platform android --message "Automated target patch for latest APK build structure."

      # =========================================================================
      # --- POST-DEPLOYMENT STATUS HANDLERS (Pass / Fail / Rollback) ---
      # =========================================================================

      - name: Rollback EAS Update on Failure
        if: failure() && steps.ship_ota.outcome == 'failure'
        run: |
          echo "OTA Update failed mid-deployment. Rolling back production channel to the last stable release..."
          eas update --channel production --platform android --rollback --message "Automatic rollback initiated due to CI/CD pipeline failure."

      - name: Pipeline Passed
        if: success()
        run: |
          echo "SUCCESS: All stages cleared. The application has been successfully deployed to production."

      - name: Pipeline Failed
        if: failure()
        run: |
          echo "FAILURE: The pipeline encountered an issue. Review the logs above to identify the failing step."